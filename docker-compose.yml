name: open-rlm-memory

services:
  postgres:
    container_name: open-rlm-memory-postgres
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rlm_memory}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - open_rlm_memory_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - open_rlm_memory_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    container_name: open-rlm-memory-app
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      DB_TYPE: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-rlm_memory}
      POSTGRES_SERVER: postgres
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-rlm_memory}
      SEARCH_CACHE_TTL_SECONDS: ${SEARCH_CACHE_TTL_SECONDS:-300}
      DEFAULT_MEMORY_NAMESPACE: ${DEFAULT_MEMORY_NAMESPACE:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    networks:
      - open_rlm_memory_network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  open_rlm_memory_postgres_data:

networks:
  open_rlm_memory_network:
    driver: bridge
